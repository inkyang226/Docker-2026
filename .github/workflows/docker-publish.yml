# GitHub Actions 工作流：自动构建 Docker 镜像并推送到 ghcr.io
# 当你推送代码到 GitHub 时，会自动构建镜像并发布到 GitHub Container Registry
# 使用方法：docker pull ghcr.io/你的用户名/仓库名:latest

name: 构建并推送 Docker 镜像

# 触发条件：当推送代码到 main 分支时执行
on:
  push:
    branches: [main]
    # 当修改以下文件时才触发构建
    paths:
      - 'Dockerfile'
      - 'index.js'
      - 'package.json'
      - 'config.json.b64'
      - 'node'
  # 允许手动触发构建
  workflow_dispatch:

# 权限设置：需要写入权限才能推送镜像到 ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 强制使用 Node.js 24 运行 Actions（解决 Node.js 20 弃用警告）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # 步骤1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置 Docker Buildx（用于构建多平台镜像）
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤3：登录 GitHub Container Registry
      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 步骤4：提取仓库信息（用于镜像名称和标签）
      - name: 提取仓库信息
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # 最新版本标签
            type=raw,value=latest
            # 基于提交 SHA 的标签
            type=sha,prefix=

      # 步骤5：构建并推送 Docker 镜像
      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
